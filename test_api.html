<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test API Image URLs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            border-radius: 4px;
        }
        button {
            background: #D4AF37;
            color: #000;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #F4E5B2;
        }
        .service-card {
            background: #333;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #D4AF37;
        }
        .image-preview {
            max-width: 300px;
            margin: 10px 0;
            border: 2px solid #444;
            border-radius: 4px;
        }
        .url {
            word-break: break-all;
            color: #D4AF37;
            font-size: 12px;
        }
        .error {
            color: #ff6b6b;
        }
        .success {
            color: #51cf66;
        }
        pre {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>🎧 Lucky Event DJ - API Image URL Tester</h1>
    
    <div class="container">
        <h2>Configuration</h2>
        <label>Backend API URL:</label>
        <input type="text" id="apiUrl" value="https://lucky-event-dj-api.onrender.com/api" placeholder="https://your-backend.onrender.com/api">
        <button onclick="testAPI()">Test API</button>
    </div>

    <div class="container">
        <h2>API Response</h2>
        <div id="status"></div>
        <pre id="rawResponse"></pre>
    </div>

    <div class="container">
        <h2>Services with Images</h2>
        <div id="services"></div>
    </div>

    <script>
        async function testAPI() {
            const apiUrl = document.getElementById('apiUrl').value.trim();
            const statusDiv = document.getElementById('status');
            const rawDiv = document.getElementById('rawResponse');
            const servicesDiv = document.getElementById('services');

            statusDiv.innerHTML = '<p>⏳ Fetching data...</p>';
            servicesDiv.innerHTML = '';
            rawDiv.textContent = '';

            try {
                const response = await fetch(`${apiUrl}/services/`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                const services = data.results || data || [];

                // Show raw response
                rawDiv.textContent = JSON.stringify(data, null, 2);

                // Show status
                statusDiv.innerHTML = `<p class="success">✅ Successfully fetched ${services.length} services</p>`;

                // Display services
                if (services.length === 0) {
                    servicesDiv.innerHTML = '<p class="error">⚠️ No services found. Add services via Django admin.</p>';
                } else {
                    services.forEach(service => {
                        const card = document.createElement('div');
                        card.className = 'service-card';
                        
                        let imageHTML = '';
                        if (service.image) {
                            imageHTML = `
                                <div>
                                    <strong>Image URL:</strong>
                                    <div class="url">${service.image}</div>
                                    <img src="${service.image}" alt="${service.title}" class="image-preview" 
                                         onerror="this.style.border='2px solid red'; this.alt='❌ Failed to load'">
                                </div>
                            `;
                        } else {
                            imageHTML = '<p class="error">⚠️ No image uploaded</p>';
                        }

                        card.innerHTML = `
                            <h3>${service.title}</h3>
                            <p>${service.short_description || 'No description'}</p>
                            <p><strong>Price:</strong> ${service.price_range || 'Not specified'}</p>
                            ${imageHTML}
                        `;
                        servicesDiv.appendChild(card);
                    });
                }

            } catch (error) {
                statusDiv.innerHTML = `<p class="error">❌ Error: ${error.message}</p>`;
                rawDiv.textContent = error.stack;
                console.error('API Test Error:', error);
            }
        }

        // Auto-test on load
        window.onload = () => {
            // You can auto-run by uncommenting:
            // testAPI();
        };
    </script>
</body>
</html>
