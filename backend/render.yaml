# Backend Deployment - Render
# This file configures the build for Render.com

# Build Command
# pip install -r requirements.txt

# Start Command  
# gunicorn luckyevent.wsgi:application

services:
  - type: web
    name: lucky-event-dj-api
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate
    startCommand: gunicorn luckyevent.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: lucky-event-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://lucky-event-dj.vercel.app
      - key: SECURE_SSL_REDIRECT
        value: True

databases:
  - name: lucky-event-db
    plan: free
    databaseName: luckyevent
